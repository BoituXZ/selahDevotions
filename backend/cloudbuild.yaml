steps:
    # 1. Build the Container
    - name: "gcr.io/cloud-builders/docker"
      args: ["build", "-t", "gcr.io/$PROJECT_ID/selah-backend:$COMMIT_SHA", "."]
      dir: "backend"

    # 2. Push the Container
    - name: "gcr.io/cloud-builders/docker"
      args: ["push", "gcr.io/$PROJECT_ID/selah-backend:$COMMIT_SHA"]

    # 3. Deploy to Cloud Run
    - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
      entrypoint: gcloud
      args:
          - "run"
          - "deploy"
          - "selah-backend"
          - "--image"
          - "gcr.io/$PROJECT_ID/selah-backend:$COMMIT_SHA"
          - "--region"
          - "us-central1"
          - "--allow-unauthenticated"

images:
    - "gcr.io/$PROJECT_ID/selah-backend:$COMMIT_SHA"

# THIS IS THE FIX:
options:
    logging: CLOUD_LOGGING_ONLY
